name: Daily Report Mail

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report script
        run: python report_mail.py
        env:
          DASHBOARD_API_TOKEN: ${{ secrets.DASHBOARD_API_TOKEN }}
          BREVO_API_KEY:        ${{ secrets.BREVO_API_KEY }}
          SENDER_EMAIL:         ${{ secrets.SENDER_EMAIL }}
          SENDER_NAME:          TangoEye Reports
          RECEIVER_EMAILS:      ${{ secrets.RECEIVER_EMAILS }}
          OPENSEARCH_USER:      ${{ secrets.OPENSEARCH_USER }}
          OPENSEARCH_PASS:      ${{ secrets.OPENSEARCH_PASS }}
